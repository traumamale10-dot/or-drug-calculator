<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OR Drug Calculator · สรพ.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --bg:       #ebeff5;
  --surf:     #ffffff;
  --raise:    #f4f6fb;
  --acc:      #0055ff;
  --acc-d:    rgba(0,85,255,.12);
  --acc-g:    rgba(0,85,255,.2);
  --red:      #dc2626; --red-d: rgba(220,38,38,.1);
  --ora:      #c2670a; --ora-d: rgba(194,103,10,.1);
  --grn:      #0a7c52; --grn-d: rgba(10,124,82,.1);
  --t1:#0d1525; --t2:#4f5d73; --t3:#9aaabb;
  --bd:rgba(0,0,0,.07); --bds:rgba(0,0,0,.13);
  --sh1:0 1px 4px rgba(0,0,0,.06);
  --sh2:0 6px 24px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
  --sh3:0 20px 60px rgba(0,0,0,.13),0 6px 20px rgba(0,0,0,.07);
  --hdr:#080f20;
  --r1:10px;--r2:16px;--r3:22px;--r4:30px;
  --font:'Sarabun',sans-serif; --mono:'JetBrains Mono',monospace;
}
[data-theme=dark]{
  --bg:#090d17; --surf:#101520; --raise:#171e2d;
  --acc:#4d9eff; --acc-d:rgba(77,158,255,.13); --acc-g:rgba(77,158,255,.22);
  --red:#f87171; --red-d:rgba(248,113,113,.12);
  --ora:#fbbf24; --ora-d:rgba(251,191,36,.12);
  --grn:#34d399; --grn-d:rgba(52,211,153,.12);
  --t1:#dde6f5; --t2:#7088a8; --t3:#2e3d52;
  --bd:rgba(255,255,255,.06); --bds:rgba(255,255,255,.11);
  --sh1:0 1px 4px rgba(0,0,0,.3);
  --sh2:0 6px 24px rgba(0,0,0,.45);
  --sh3:0 20px 60px rgba(0,0,0,.65);
  --hdr:#040810;
}

/* ── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t1);
  min-height:100vh;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bds);border-radius:9px}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{background:var(--hdr);position:sticky;top:0;z-index:300;
  box-shadow:0 2px 30px rgba(0,0,0,.4);transition:background .3s}
.hi{max-width:1260px;margin:0 auto;padding:13px 24px;
  display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:12px}
.logo-ring{width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(140deg,#1a72ff,#0038cc);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 4px 18px rgba(26,114,255,.45);animation:lglow 3s ease-in-out infinite}
@keyframes lglow{0%,100%{box-shadow:0 4px 18px rgba(26,114,255,.4)}50%{box-shadow:0 4px 28px rgba(26,114,255,.65)}}
.logo h1{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.3px}
.logo p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}

/* weight bar in header */
.w-bar{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  border-radius:var(--r4);padding:6px 14px 6px 10px}
.w-bar label{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;white-space:nowrap}
.w-bar input{background:transparent;border:none;outline:none;color:#fff;
  font-size:16px;font-weight:700;font-family:var(--mono);width:72px;text-align:center}
.w-bar input::placeholder{color:rgba(255,255,255,.3)}
.w-bar span{font-size:12px;color:rgba(255,255,255,.5);font-weight:600}

/* pedi toggle */
.p-toggle{display:flex;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);border-radius:var(--r4);overflow:hidden}
.pt-btn{padding:8px 14px;font-size:12px;font-weight:700;color:rgba(255,255,255,.55);
  cursor:pointer;border:none;background:none;font-family:var(--font);
  transition:all .2s;white-space:nowrap}
.pt-btn.on{background:var(--acc);color:#fff;border-radius:var(--r4)}

/* theme pill */
.tpill{width:52px;height:28px;background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.18);border-radius:99px;
  cursor:pointer;position:relative;flex-shrink:0;transition:background .3s}
.tpill:hover{background:rgba(255,255,255,.16)}
.tknob{position:absolute;left:3px;top:3px;width:20px;height:20px;border-radius:50%;
  background:#fff;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
[data-theme=dark] .tknob{transform:translateX(24px);background:#4d9eff}
.tico{position:absolute;top:50%;transform:translateY(-50%);font-size:10px;pointer-events:none}
.sun{right:6px;transition:opacity .2s}
.moon{left:6px;opacity:0;transition:opacity .2s}
[data-theme=dark] .sun{opacity:0}
[data-theme=dark] .moon{opacity:1}

/* ── MAIN LAYOUT ─────────────────────────────────────────── */
.wrap{max-width:1260px;margin:0 auto;padding:24px 20px;
  display:grid;grid-template-columns:340px 1fr;gap:20px;min-height:calc(100vh - 70px)}

/* ── LEFT PANEL (drug list) ──────────────────────────────── */
.left{display:flex;flex-direction:column;gap:14px}
.search-box{position:relative}
.search-box input{width:100%;padding:13px 46px 13px 46px;
  background:var(--surf);border:2px solid var(--bd);border-radius:var(--r4);
  font-size:15px;font-family:var(--font);color:var(--t1);
  transition:border-color .2s,box-shadow .2s;box-shadow:var(--sh1)}
.search-box input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 4px var(--acc-g)}
.search-box input::placeholder{color:var(--t3)}
.sico{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px}
.sclr{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:var(--t3);color:var(--surf);border:none;border-radius:50%;
  width:24px;height:24px;font-size:12px;cursor:pointer;
  display:none;align-items:center;justify-content:center}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 14px;border-radius:99px;border:1.5px solid var(--bds);
  font-size:12px;font-weight:600;font-family:var(--font);
  color:var(--t2);background:var(--surf);cursor:pointer;transition:all .18s}
.chip:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-1px)}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc);
  box-shadow:0 4px 12px var(--acc-g)}

/* drug list */
.dlist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
  padding-right:2px;max-height:calc(100vh - 220px)}
.ditem{background:var(--surf);border:2px solid var(--bd);border-radius:var(--r2);
  padding:14px 16px;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;flex-shrink:0}
.ditem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  border-radius:2px 0 0 2px}
.ditem.ar::before{background:var(--red)}
.ditem.ao::before{background:var(--ora)}
.ditem.ag::before{background:var(--grn)}
.ditem:hover{border-color:var(--acc);transform:translateX(3px);box-shadow:var(--sh2)}
.ditem.sel{border-color:var(--acc);background:var(--acc-d);transform:translateX(3px)}
.ditem.sel::before{background:var(--acc)}
.di-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.di-name{font-size:15px;font-weight:700;color:var(--t1);line-height:1.2}
.di-grp{font-size:12px;color:var(--t2);margin-top:2px}
.di-arr{color:var(--t3);font-size:16px;transition:transform .2s}
.ditem:hover .di-arr,.ditem.sel .di-arr{transform:translateX(4px);color:var(--acc)}
.di-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:99px;letter-spacing:.3px;white-space:nowrap}
.br{background:var(--red-d);color:var(--red)}
.bo{background:var(--ora-d);color:var(--ora)}
.bg{background:var(--grn-d);color:var(--grn)}
.bb{background:var(--acc-d);color:var(--acc)}

/* ── RIGHT PANEL (calc + detail) ────────────────────────── */
.right{display:flex;flex-direction:column;gap:0}
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;min-height:400px;
  color:var(--t2);text-align:center;gap:12px}
.es-ico{font-size:64px;opacity:.4}
.es-txt{font-size:18px;font-weight:600;color:var(--t2)}
.es-sub{font-size:14px;color:var(--t3)}

/* drug detail card */
.dcard{background:var(--surf);border-radius:var(--r3);border:1px solid var(--bd);
  box-shadow:var(--sh2);overflow:hidden;animation:pop .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* hero section */
.dhero{padding:28px 32px 24px;border-bottom:1px solid var(--bd);
  background:var(--raise);position:relative;overflow:hidden}
.dhero::after{content:'';position:absolute;right:-30px;top:-30px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,var(--acc-d),transparent 70%);pointer-events:none}
.dname{font-size:32px;font-weight:800;color:var(--t1);line-height:1.1;margin-bottom:4px}
.d-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.dalert{display:flex;align-items:flex-start;gap:10px;
  padding:12px 16px;border-radius:var(--r1);font-size:13px;
  line-height:1.55;margin-bottom:0}
.dalert.r{background:var(--red-d);border-left:4px solid var(--red)}
.dalert.o{background:var(--ora-d);border-left:4px solid var(--ora)}
.dalert.g{background:var(--grn-d);border-left:4px solid var(--grn)}
.dalert-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.dalert-txt{color:var(--t1);font-size:13px;line-height:1.6}

/* calc section */
.dcalc{padding:24px 32px;border-bottom:1px solid var(--bd)}
.calc-label{font-size:11px;font-weight:800;color:var(--t2);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

/* weight row */
.wrow{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.winp-wrap{display:flex;align-items:center;gap:8px;
  background:var(--raise);border:2px solid var(--bds);border-radius:var(--r1);
  padding:10px 16px;flex:1;transition:border-color .2s,box-shadow .2s}
.winp-wrap:focus-within{border-color:var(--acc);box-shadow:0 0 0 4px var(--acc-g)}
.winp-wrap input{background:transparent;border:none;outline:none;
  font-size:24px;font-weight:700;font-family:var(--mono);color:var(--t1);
  width:100%;text-align:center}
.winp-wrap input::placeholder{color:var(--t3);font-size:18px;font-weight:400}
.winp-wrap span{font-size:14px;color:var(--t2);font-weight:600}

/* result grid */
.rbox{background:linear-gradient(135deg,var(--acc) 0%,#003ccc 100%);
  border-radius:var(--r2);padding:22px 26px;margin-top:16px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;
  animation:rp .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 28px var(--acc-g)}
@keyframes rp{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
[data-theme=dark] .rbox{background:linear-gradient(135deg,#1a4db8 0%,#0a2875 100%)}
.rcell{padding:0 20px;border-right:1px solid rgba(255,255,255,.15);text-align:center}
.rcell:first-child{padding-left:0;text-align:left}
.rcell:last-child{border-right:none;text-align:right}
.rlbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.rval{font-size:28px;font-weight:800;color:#fff;font-family:var(--mono);line-height:1}
.runit{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px}
.rbox.empty-res{background:var(--raise);box-shadow:none;border:2px dashed var(--bds)}
.rbox.empty-res .rlbl,.rbox.empty-res .rval,.rbox.empty-res .runit{color:var(--t3)}
.rbox.empty-res .rval{font-size:22px}

/* dose reference table */
.dose-sec{padding:24px 32px;border-bottom:1px solid var(--bd)}
.sec-title{font-size:12px;font-weight:800;color:var(--t2);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bd)}

.dose-grid{display:grid;gap:8px}
.dose-row{background:var(--raise);border-radius:var(--r1);
  border:1px solid var(--bd);overflow:hidden;transition:border-color .2s}
.dose-row:hover{border-color:var(--bds)}
.dr-head{padding:10px 14px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--bd);cursor:pointer}
.dr-indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dr-indication{font-size:13px;font-weight:700;color:var(--t1)}
.dr-type{font-size:11px;color:var(--t2);margin-left:auto;
  background:var(--bd);padding:2px 8px;border-radius:99px}
.dr-body{padding:12px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.dr-cell{display:flex;flex-direction:column;gap:3px}
.dr-clbl{font-size:10px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.4px}
.dr-cval{font-size:14px;font-weight:600;color:var(--t1);font-family:var(--mono)}
.dr-calc{font-size:13px;font-weight:700;color:var(--acc);
  font-family:var(--mono);margin-top:4px;
  padding:4px 8px;background:var(--acc-d);border-radius:6px;
  display:inline-block;animation:hi .25s ease}
@keyframes hi{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.dr-calc.warn{color:var(--ora);background:var(--ora-d)}

/* detail accordion */
.detail-sec{padding:24px 32px}
.acc{display:flex;flex-direction:column;gap:10px}
.acc-item{border-radius:var(--r1);border:1px solid var(--bd);overflow:hidden;
  transition:border-color .2s}
.acc-item:hover{border-color:var(--bds)}
.acc-btn{width:100%;padding:13px 16px;display:flex;align-items:center;gap:10px;
  background:var(--raise);border:none;cursor:pointer;font-family:var(--font);
  text-align:left;transition:background .2s}
.acc-btn:hover{background:var(--bd)}
.acc-ico{width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.acc-ttl{font-size:14px;font-weight:700;color:var(--t1);flex:1}
.acc-arr{font-size:12px;color:var(--t3);transition:transform .25s}
.acc-item.open .acc-arr{transform:rotate(180deg)}
.acc-body{display:none;padding:16px;font-size:14px;line-height:1.7;color:var(--t1)}
.acc-item.open .acc-body{display:block;animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* info table */
.itbl{width:100%;border-collapse:collapse}
.itbl td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:top}
.itbl tr:last-child td{border-bottom:none}
.itbl td:first-child{font-size:12px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.3px;width:38%;white-space:nowrap}
.itbl td:last-child{font-size:14px;color:var(--t1);font-family:var(--mono);font-size:13px}
.pill-list{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:3px 10px;border-radius:99px;font-size:12px;
  background:var(--bd);color:var(--t2);font-family:var(--font);font-weight:500}
.pill.red{background:var(--red-d);color:var(--red)}
.pill.ora{background:var(--ora-d);color:var(--ora)}
.pill.grn{background:var(--grn-d);color:var(--grn)}
.pill.blue{background:var(--acc-d);color:var(--acc)}

/* no-weight warning */
.nw{text-align:center;padding:18px;color:var(--t3);font-size:14px;
  background:var(--raise);border-radius:var(--r1);border:2px dashed var(--bds)}

/* toast */
.tw{position:fixed;bottom:24px;right:24px;z-index:999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#0d1525;color:#dde6f5;padding:12px 18px;border-radius:var(--r1);
  font-size:14px;font-weight:500;box-shadow:var(--sh3);
  animation:tin .3s cubic-bezier(.34,1.56,.64,1);pointer-events:auto;
  display:flex;align-items:center;gap:8px}
.toast.out{animation:tout .25s ease forwards}
@keyframes tin{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes tout{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(24px)}}
[data-theme=dark] .toast{background:#1a2540}

/* disclaimer banner */
.disc{background:var(--ora-d);border:1px solid var(--ora);border-radius:var(--r1);
  padding:10px 16px;font-size:12px;color:var(--t1);
  display:flex;gap:8px;align-items:flex-start;margin-bottom:16px;line-height:1.5}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:900px){
  .wrap{grid-template-columns:1fr;padding:14px 12px}
  .dlist{max-height:280px}
  .rval{font-size:22px}
  .rbox{grid-template-columns:1fr 1fr}
  .rcell:nth-child(3){border-right:none}
  .dhero{padding:20px 22px 18px}
  .dname{font-size:26px}
  .dcalc,.dose-sec,.detail-sec{padding:18px 22px}
}
@media(max-width:560px){
  .hi{padding:10px 14px;flex-wrap:wrap;gap:8px}
  .logo h1{font-size:16px}
  .w-bar{order:3;width:100%}
  .rbox{grid-template-columns:1fr}
  .rcell{border-right:none;border-bottom:1px solid rgba(255,255,255,.15);
    padding:12px 0;text-align:left}
  .rcell:last-child{border-bottom:none}
}
</style>
</head>
<body>
<!-- ── HEADER ───────────────────────────────────────────── -->
<header class="hdr">
  <div class="hi">
    <div class="logo">
      <div class="logo-ring">💊</div>
      <div>
        <h1>OR Drug Calculator</h1>
        <p>สรพ. HA Standard · ห้องผ่าตัด</p>
      </div>
    </div>
    <div class="hdr-right">
      <div class="w-bar">
        <label>⚖️ น้ำหนัก</label>
        <input id="gweight" type="number" placeholder="70.0" min="0.5" max="350" step="0.1"
          oninput="recalc()">
        <span>kg</span>
      </div>
      <div class="p-toggle">
        <button class="pt-btn on" id="btn-a" onclick="setPtype('adult')">ผู้ใหญ่</button>
        <button class="pt-btn" id="btn-p" onclick="setPtype('pedi')">เด็ก</button>
      </div>
      <button class="tpill" onclick="toggleTheme()">
        <div class="tknob"></div>
        <span class="tico sun">☀️</span>
        <span class="tico moon">🌙</span>
      </button>

    </div>
  </div>
</header>

         เครื่องมือคำนวณยาในห้องผ่าตัด มาตรฐาน <strong>สรพ. (HA)</strong> · รองรับยาผู้ใหญ่และเด็ก · ข้อมูลอ้างอิงจาก Miller's Anesthesia, SOBA, ASRA, AHA ACLS และแนวท

<!-- ── BODY ─────────────────────────────────────────────── -->
<div class="wrap">
  <!-- LEFT: search + drug list -->
  <div class="left">
    <div class="search-box">
      <span class="sico">🔍</span>
      <input id="srch" type="text" placeholder="ค้นหายา... Propofol, Ketamine..." oninput="filterDrugs(this.value)">
      <button class="sclr" id="sclr" onclick="clearSearch()">✕</button>
    </div>
    <div class="chips" id="chips">
      <button class="chip on" onclick="setGrp('all',this)">ทั้งหมด</button>
      <button class="chip" onclick="setGrp('Induction',this)">🎯 ชักนำ</button>
      <button class="chip" onclick="setGrp('Muscle Relaxant',this)">💪 NMB</button>

/* ================================================================
   STATE
================================================================ */
let ptype = 'adult', selDrug = null, curGrp = 'all', curSrch = '';

/* ================================================================
   THEME
================================================================ */
(()=>{ const t=localStorage.getItem('ort')||'light'; document.documentElement.setAttribute('data-theme',t); })();
function toggleTheme(){
  const n = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('ort',n);
}

/* ================================================================
   PATIENT TYPE
================================================================ */
function setPtype(t){
  ptype = t;
  document.getElementById('btn-a').classList.toggle('on', t==='adult');
  document.getElementById('btn-p').classList.toggle('on', t==='pedi');
  if(selDrug) renderRight(selDrug);
}

/* ================================================================
   DRUG LIST
================================================================ */
function filtered(){
  const q = curSrch.toLowerCase();
  return DRUGS.filter(d => {
    const gok = curGrp==='all' || d.group===curGrp;
    const sok = !q || d.name.toLowerCase().includes(q) || (d.brand||'').toLowerCase().includes(q) || d.group.toLowerCase().includes(q);
    return gok && sok;
  });
}

function renderList(){
  const list = filtered();
  const el = document.getElementById('dlist');
  if(!list.length){
    el.innerHTML=`<div style="text-align:center;padding:32px 16px;color:var(--t3)">
      <div style="font-size:36px;margin-bottom:10px">🔍</div>
      <div style="font-size:14px">ไม่พบยาที่ค้นหา</div></div>`;
    return;
  }
  el.innerHTML = list.map(d => {
    const isSel = selDrug && selDrug.id === d.id;
    const cl = d.alertLevel==='red'?'ar':d.alertLevel==='orange'?'ao':'ag';
    const bc = d.alertLevel==='red'?'br':d.alertLevel==='orange'?'bo':'bg';
    const ico = d.alertLevel==='red'?'⚠️':d.alertLevel==='orange'?'⚡':'✓';
    return `<div class="ditem ${cl} ${isSel?'sel':''}" onclick="selectDrug('${d.id}')">
      <div class="di-top">
        <div>
          <div class="di-name">${d.name}</div>
          <div class="di-grp">${d.group} · ${d.route}</div>
        </div>
        <span class="di-arr">›</span>
      </div>
      <div class="di-tags">
        <span class="badge ${bc}">${ico} ${d.alert}</span>
        <span class="badge bb">${d.class.split('—')[0].trim()}</span>
      </div>
    </div>`;
  }).join('');
}

function setGrp(g, el){
  curGrp = g;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderList();
}

function filterDrugs(v){
  curSrch = v;
  document.getElementById('sclr').style.display = v?'flex':'none';
  renderList();
}

function clearSearch(){
  document.getElementById('srch').value='';
  filterDrugs('');
}

/* ================================================================
   SELECT DRUG → render right panel
================================================================ */
function selectDrug(id){
  selDrug = DRUGS.find(d=>d.id===id);
  if(!selDrug) return;
  renderList();
  renderRight(selDrug);
  // scroll right panel into view on mobile
  document.getElementById('right').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderRight(d){
  const w = parseFloat(document.getElementById('gweight').value)||0;
  const dd = ptype==='adult' ? d.adult : (d.pedi||d.adult);
  const ac = d.alertLevel;
  const aico = ac==='red'?'🔴':ac==='orange'?'🟠':'🟢';
  const acls = ac==='red'?'r':ac==='orange'?'o':'g';

  document.getElementById('right').innerHTML = `
  <div class="dcard">
    <!-- HERO -->
    <div class="dhero">
      <div class="d-tags">
        <span class="badge ${ac==='red'?'br':ac==='orange'?'bo':'bg'}">${aico} ${d.alert}</span>
        <span class="badge bb">${d.group}</span>
        <span class="badge" style="background:var(--bd);color:var(--t2)">${d.route}</span>
        ${d.brand?`<span class="badge" style="background:var(--bd);color:var(--t3)">${d.brand}</span>`:''}
      </div>
      <div class="dname">${d.name}</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:16px;font-family:var(--mono)">${d.class}</div>
      <div class="dalert ${acls}">
        <span class="dalert-ico">${aico}</span>
        <div class="dalert-txt"><strong>${d.alert}:</strong> ${d.notes}</div>
      </div>
    </div>

    <!-- CALC -->
    <div class="dcalc">
      <div class="calc-label">🧮 คำนวณ Dose — ${ptype==='adult'?'ผู้ใหญ่':'เด็ก'}</div>
      ${w===0 ? `<div class="nw">⚖️ กรอกน้ำหนักผู้ป่วยที่ Header เพื่อคำนวณ dose อัตโนมัติ</div>` : ''}
      ${renderResultBox(d, dd, w)}
    </div>

    <!-- DOSE TABLE -->
    <div class="dose-sec">
      <div class="sec-title">📋 Dose Reference — ${ptype==='adult'?'ผู้ใหญ่':'เด็ก'}</div>
      <div class="dose-grid">
        ${renderDoseRows(d, dd, w)}
      </div>
    </div>

    <!-- PHARMACOLOGY -->
    <div class="detail-sec">
      <div class="sec-title">🔬 รายละเอียดยา</div>
      <div class="acc">
        ${makeAcc('⚙️','pharmacology','สรีรวิทยาและเภสัชวิทยา','#acc-d1',`
          <table class="itbl">
            <tr><td>Mechanism</td><td>${d.mechanism}</td></tr>
            <tr><td>Onset</td><td>${d.onset}</td></tr>
            <tr><td>Duration</td><td>${d.duration}</td></tr>
            <tr><td>Half-life</td><td>${d.halflife}</td></tr>
            <tr><td>Metabolism</td><td>${d.metabolism}</td></tr>
            <tr><td>Concentration</td><td>${d.concentration.form}</td></tr>
          </table>`,'bg')}
        ${makeAcc('⚠️','safety','ข้อห้ามและข้อควรระวัง','#acc-d2',`
          <div style="margin-bottom:12px">
            <div style="font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Contraindications</div>
            <div class="pill-list">${(d.ci||[]).map(x=>`<span class="pill red">${x}</span>`).join('')}</div>
          </div>
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--ora);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Cautions / ข้อควรระวัง</div>
            <div class="pill-list">${(d.caution||[]).map(x=>`<span class="pill ora">${x}</span>`).join('')}</div>
          </div>`,'br')}
        ${makeAcc('💊','sideeffects','ผลข้างเคียง','#acc-d3',`
          <div class="pill-list">${(d.sideEffects||[]).map(x=>`<span class="pill">${x}</span>`).join('')}</div>
          <div style="margin-top:12px">

            <div style="font-size:14px;color:var(--t1)">${d.antidote||'Supportive care'}</div>
          </div>`,'bg')}
        ${makeAcc('📚','refs','References','#acc-d4',`<div style="font-size:13px;color:var(--t2);line-height:1.7">${d.refs||'—'}</div>`,'bb')}

function renderResultBox(d, dd, w){
  if(w===0) return `<div class="rbox empty-res">
    <div class="rcell"><div class="rlbl">Dose</div><div class="rval">—</div><div class="runit">กรอกน้ำหนัก</div></div>
    <div class="rcell"><div class="rlbl">Volume</div><div class="rval">—</div><div class="runit">mL</div></div>
    <div class="rcell"><div class="rlbl">Concentration</div><div class="rval">—</div><div class="runit">${d.concentration.unit}/mL</div></div></div>`;

  const fk = Object.keys(dd||{})[0];
  const fv = dd?.[fk];
  if(!fv?.mgPerKg && !fv?.fix) return `<div class="rbox empty-res"><div class="rcell" style="grid-column:1/-1"><div class="rlbl">ข้อมูล Dose</div><div class="rval" style="font-size:18px">${fv?.dose||fv?.note||'ดู Reference ด้านล่าง'}</div><div class="runit">${fv?.indication||''}</div></div></div>`;

  const dose = Math.min((fv.mgPerKg||0)*w, fv.max||9999);
  const conc = d.concentration.value;
  const vol = conc>0 ? (dose/conc) : 0;
  const maxed = fv.max && ((fv.mgPerKg||0)*w) > fv.max;

  return `<div class="rbox">
    <div class="rcell">
      <div class="rlbl">Dose คำนวณ (${fv.indication||fk})</div>
      <div class="rval">${dose.toFixed(1)}</div>
      <div class="runit">${d.concentration.unit} · ${fv.mgPerKg} ${d.concentration.unit}/kg × ${w} kg${maxed?` · <strong>MAX ${fv.max}</strong>`:''}</div>
    </div>
    <div class="rcell">
      <div class="rlbl">Volume</div>
      <div class="rval">${vol>0?vol.toFixed(2):'—'}</div>
      <div class="runit">mL</div>
    </div>
    <div class="rcell">
      <div class="rlbl">Concentration</div>
      <div class="rval">${d.concentration.value}</div>
      <div class="runit">${d.concentration.unit}/mL · ${d.concentration.form.split('(')[0].trim()}</div>
    </div>
  </div>`;
}

        ${v.mgPerKg?`<div class="dr-cell"><div class="dr-clbl">mg/kg</div><div class="dr-cval">${v.mgPerKg} ${d.concentration.unit}/kg</div></div>`:''}
        ${v.max?`<div class="dr-cell"><div class="dr-clbl">Max Dose</div><div class="dr-cval" style="color:var(--red)">${v.max} ${d.concentration.unit}</div></div>`:''}
        ${v.indication?`<div class="dr-cell"><div class="dr-clbl">วัตถุประสงค์</div><div class="dr-cval" style="font-family:var(--font);font-size:13px">${v.indication}</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function makeAcc(icon, id, title, tid, body, bc){
  return `<div class="acc-item" id="${id}">
    <button class="acc-btn" onclick="toggleAcc('${id}')">
      <div class="acc-ico" style="background:var(--acc-d)">${icon}</div>
      <span class="acc-ttl">${title}</span>
      <span class="acc-arr">▼</span>
    </button>
    <div class="acc-body">${body}</div>
  </div>`;
}
function toggleAcc(id){
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

/* ================================================================
   RECALC on weight change
================================================================ */
function recalc(){
  if(selDrug) renderRight(selDrug);
}

/* ================================================================
   INIT
================================================================ */
document.addEventListener('DOMContentLoaded', ()=>{ renderList(); });
</script>
